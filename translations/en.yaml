---
configuration:
  api_key:
    name: Hetzner DNS API Token
    description: Your API token from Hetzner DNS Console
  zone_id:
    name: DNS Zone ID
    description: The ID of your DNS zone in Hetzner DNS
  domain:
    name: Domain Name
    description: The fully qualified domain name to update (e.g., home.example.com)
  update_interval:
    name: Update Interval
    description: How often to check and update the DNS record
  dry_run:
    name: Dry Run
    description: Log what would be updated without making any changes to DNS records
  log_level:
    name: Log Level
    description: Controls the level of log output
